<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bract</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #fff;
            color: #1d1d1f;
            text-align: center;
            padding: 2rem;
        }
        h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        .tagline { font-size: 1.125rem; color: #86868b; margin-bottom: 2rem; }
        .links { display: flex; gap: 1.5rem; font-size: 0.9375rem; }
        a { color: #0066cc; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Bract</h1>
    <p class="tagline">Intelligent calendar for iOS and Mac</p>
    <div class="links">
        <a href="/privacy">Privacy Policy</a>
    </div>
</body>
</html>
